<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>병아리 키우기 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🐣 병아리 키우기 게임 🥚</h1>
    <div id="game-container">
        <div class="stats">
            <h2>현재 상태</h2>
            <p>병아리 수: <span id="chickCount">1</span> 마리</p>
            <p>먹이 레벨: <span id="foodLevel">0</span></p>
            <p>성장도: <span id="growthLevel">0</span>%</p>
        </div>

        <div class="actions">
            <h2>행동</h2>
            <button id="feedButton">먹이 주기 (1 레벨)</button>
            <button id="buyChickButton">병아리 추가 구매 (50 먹이)</button>
            <button id="updateGameButton">게임 업데이트</button>
        </div>

        <div id="message">게임을 시작하세요!</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
